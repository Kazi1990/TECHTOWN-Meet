<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHTOWN | Neon Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@500;700&display=swap');
        
        body {
            background-color: #050112;
            background-image: radial-gradient(circle at 50% 50%, #1a0b3c 0%, #050112 100%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-col;
            align-items: center;
        }

        .neon-border-cyan {
            border: 2px solid #00f2ff;
            box-shadow: 0 0 15px #00f2ff, inset 0 0 10px #00f2ff;
        }
        
        .neon-text-cyan { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        .neon-text-magenta { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }

        .glass-container {
            background: rgba(10, 2, 30, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 20px;
        }

        .btn-magenta {
            background: #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
            font-family: 'Orbitron', sans-serif;
            transition: 0.3s;
        }

        .btn-control {
            border: 2px solid #00f2ff;
            padding: 10px 20px;
            border-radius: 12px;
            font-family: 'Orbitron';
            font-size: 12px;
            background: rgba(0, 242, 255, 0.1);
            color: #00f2ff;
        }

        .active-off { border-color: #ff00ff; color: #ff00ff; background: rgba(255, 0, 255, 0.1); }

        #chat-window {
            height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 8px;
            border-radius: 10px;
            font-size: 14px;
        }

        video { border-radius: 15px; background: #000; object-fit: cover; width: 100%; height: 100%; }
    </style>
</head>
<body class="p-4">

    <div id="auth-screen" class="w-full max-w-md mt-20">
        <div class="glass-container p-10 text-center neon-border-cyan">
            <h1 class="text-4xl font-black mb-1 tracking-tighter italic" style="font-family: 'Orbitron';">
                <span class="neon-text-cyan">TECH</span><span class="neon-text-magenta">TOWN</span>
            </h1>
            <p class="text-[10px] tracking-[0.4em] neon-text-cyan font-bold mb-10">NEON PROTOCOL ACTIVATED</p>
            
            <div class="space-y-6 text-left text-xs font-bold uppercase tracking-widest">
                <div>
                    <label class="neon-text-cyan ml-1">User Identity</label>
                    <input type="text" id="username" placeholder="NAME..." class="w-full p-4 mt-1 rounded-lg bg-black/60 border border-cyan-500/50 outline-none text-cyan-300">
                </div>
                <div>
                    <label class="neon-text-magenta ml-1">Room Frequency</label>
                    <input type="password" id="password" placeholder="PIN..." class="w-full p-4 mt-1 rounded-lg bg-black/60 border border-magenta-500/50 outline-none text-magenta-300">
                </div>
                <button onclick="loginUser()" class="w-full btn-magenta p-4 rounded-xl font-black text-lg italic uppercase text-white">Initialize Link</button>
            </div>
        </div>
    </div>

    <div id="call-screen" class="hidden w-full max-w-6xl">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mt-4">
            <div class="lg:col-span-1 glass-container p-5 border border-cyan-500/30">
                <h3 class="neon-text-cyan mb-4 text-sm font-bold uppercase tracking-widest italic">Live Feed</h3>
                <div id="friend-list" class="space-y-3 mb-6"></div>
                
                <h3 class="neon-text-magenta mb-2 text-sm font-bold uppercase italic">Data Stream</h3>
                <div id="chat-window" class="mb-3"></div>
                <div class="flex gap-2">
                    <input type="text" id="msg-input" placeholder="Data..." class="flex-1 bg-black/60 border border-cyan-900 rounded p-2 text-xs outline-none">
                    <button onclick="sendMessage()" class="bg-cyan-600 px-3 rounded font-bold text-xs">SEND</button>
                </div>
            </div>

            <div class="lg:col-span-3 flex flex-col gap-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-64 md:h-80">
                    <div class="relative neon-border-cyan rounded-2xl overflow-hidden"><video id="localVideo" autoplay muted playsinline></video></div>
                    <div class="relative border-2 border-magenta-500 rounded-2xl overflow-hidden"><video id="remoteVideo" autoplay playsinline></video></div>
                </div>

                <div class="glass-container p-6 flex justify-center gap-6 self-center px-12 neon-border-cyan">
                    <button id="mic-btn" onclick="toggleAudio()" class="btn-control">MIC ON</button>
                    <button onclick="location.reload()" class="btn-control !border-red-600 !text-red-500">END</button>
                    <button id="cam-btn" onclick="toggleVideo()" class="btn-control">CAM ON</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJsyYpakn99GGYpwjHIHVaMpBEa4SBntI",
            authDomain: "booming-premise-253521.firebaseapp.com",
            projectId: "booming-premise-253521",
            storageBucket: "booming-premise-253521.firebasestorage.app",
            messagingSenderId: "916001736696",
            appId: "1:916001736696:web:5638d8a66f918fa614b80d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let peer, localStream, conn;

        window.loginUser = async () => {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) return;

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('call-screen').classList.remove('hidden');

            localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('localVideo').srcObject = localStream;

            await setDoc(doc(db, "online_users", user), { name: user, room: pass });
            peer = new Peer(user);

            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', rs => document.getElementById('remoteVideo').srcObject = rs);
            });

            peer.on('connection', c => { conn = c; c.on('data', d => appendMsg(d, 'peer')); });

            onSnapshot(query(collection(db, "online_users"), where("room", "==", pass)), (snap) => {
                const list = document.getElementById('friend-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    if (d.data().name !== user) {
                        let div = document.createElement('div');
                        div.className = "p-3 border-l-4 border-cyan-400 glass-container hover:bg-cyan-500/20 cursor-pointer uppercase font-bold text-xs";
                        div.innerText = d.data().name;
                        div.onclick = () => startCall(d.data().name);
                        list.appendChild(div);
                    }
                });
            });
        };

        window.startCall = (target) => {
            peer.call(target, localStream).on('stream', rs => document.getElementById('remoteVideo').srcObject = rs);
            conn = peer.connect(target);
            conn.on('data', d => appendMsg(d, 'peer'));
        };

        window.sendMessage = () => {
            const input = document.getElementById('msg-input');
            if (conn && input.value) {
                conn.send(input.value);
                appendMsg(input.value, 'me');
                input.value = "";
            }
        };

        function appendMsg(m, s) {
            const box = document.getElementById('chat-window');
            box.innerHTML += `<div style="color:${s==='me'?'#00f2ff':'#ff00ff'}">${s==='me'?'Me':'Peer'}: ${m}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        window.toggleVideo = () => {
            const t = localStream.getVideoTracks()[0]; t.enabled = !t.enabled;
            document.getElementById('cam-btn').innerText = t.enabled ? "CAM ON" : "CAM OFF";
            document.getElementById('cam-btn').classList.toggle('active-off');
        };

        window.toggleAudio = () => {
            const t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled;
            document.getElementById('mic-btn').innerText = t.enabled ? "MIC ON" : "MIC OFF";
            document.getElementById('mic-btn').classList.toggle('active-off');
        };
    </script>
</body>
</html>
