<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHTOWN | Neon Hyper-Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@500;700&display=swap');

        body {
            background-color: #050112;
            background-image: radial-gradient(circle at 50% 50%, #1a0b3c 0%, #050112 100%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
        }

        /* Extreme Neon Effects */
        .neon-border-cyan {
            border: 2px solid #00f2ff;
            box-shadow: 0 0 15px #00f2ff, inset 0 0 10px #00f2ff;
        }
        
        .neon-border-magenta {
            border: 2px solid #ff00ff;
            box-shadow: 0 0 15px #ff00ff, inset 0 0 10px #ff00ff;
        }

        .neon-text-cyan {
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
        }

        .neon-text-magenta {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        }

        .glass-container {
            background: rgba(10, 2, 30, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 20px;
        }

        .btn-magenta {
            background: #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
        }
        
        .btn-magenta:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 40px #ff00ff;
        }

        video {
            border-radius: 15px;
            background: #000;
            object-fit: cover;
        }

        .status-online {
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <div id="auth-screen" class="w-full max-w-md mt-24">
        <div class="glass-container p-10 text-center neon-border-cyan">
            <h1 class="text-5xl font-black mb-1 tracking-tighter italic" style="font-family: 'Orbitron', sans-serif;">
                <span class="neon-text-cyan">TECH</span><span class="neon-text-magenta">TOWN</span>
            </h1>
            <p class="text-[11px] tracking-[0.6em] neon-text-cyan font-bold mb-10">NEON PROTOCOL ACTIVATED</p>
            
            <div class="space-y-6 text-left">
                <div>
                    <label class="text-xs neon-text-cyan font-bold ml-1 uppercase">User Identity</label>
                    <input type="text" id="username" placeholder="NAME..." 
                        class="w-full p-4 mt-1 rounded-lg bg-black/60 border border-cyan-500/50 focus:border-cyan-400 outline-none text-cyan-300 font-bold tracking-widest transition-all">
                </div>
                
                <div>
                    <label class="text-xs neon-text-magenta font-bold ml-1 uppercase">Room Frequency</label>
                    <input type="password" id="password" placeholder="PIN..." 
                        class="w-full p-4 mt-1 rounded-lg bg-black/60 border border-magenta-500/50 focus:border-magenta-400 outline-none text-magenta-300 font-bold tracking-widest transition-all">
                </div>
                
                <button onclick="loginUser()" class="w-full btn-magenta p-5 rounded-xl font-black text-xl italic uppercase text-white">Initialize Link</button>
            </div>
        </div>
    </div>

    <div id="call-screen" class="hidden w-full max-w-6xl mt-6">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-1 glass-container p-6 h-[600px] flex flex-col neon-border-magenta">
                <div class="flex items-center gap-4 mb-8 border-b border-magenta-500/30 pb-4">
                    <div class="w-14 h-14 bg-magenta-600 rounded-full flex items-center justify-center font-black text-2xl shadow-[0_0_15px_#ff00ff]" id="avatar">T</div>
                    <div>
                        <h2 id="display-name" class="font-bold text-xl neon-text-cyan uppercase">User</h2>
                        <span class="text-[10px] font-bold text-green-400 uppercase tracking-widest flex items-center gap-2">
                            <div class="status-online"></div> Secure
                        </span>
                    </div>
                </div>
                <p class="text-[11px] font-black text-magenta-400 uppercase mb-4 tracking-widest">Active Peers</p>
                <div id="friend-list" class="space-y-4 overflow-y-auto flex-1 pr-2">
                    </div>
            </div>

            <div class="lg:col-span-3 flex flex-col gap-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 h-[450px]">
                    <div class="relative neon-border-cyan rounded-2xl overflow-hidden">
                        <video id="localVideo" autoplay muted playsinline class="w-full h-full"></video>
                        <div class="absolute top-4 left-4 bg-black/70 neon-text-cyan border border-cyan-500 px-4 py-1 rounded-md text-[10px] font-black italic">MY_SYSTEM</div>
                    </div>
                    <div class="relative neon-border-magenta rounded-2xl overflow-hidden">
                        <video id="remoteVideo" autoplay playsinline class="w-full h-full"></video>
                        <div class="absolute top-4 left-4 bg-black/70 neon-text-magenta border border-magenta-500 px-4 py-1 rounded-md text-[10px] font-black italic">REMOTE_SYNC</div>
                    </div>
                </div>

                <div class="glass-container p-6 flex items-center justify-center gap-12 self-center px-16 neon-border-cyan">
                    <button onclick="startCall(null)" class="p-4 rounded-full border-2 border-cyan-500 text-cyan-400 hover:bg-cyan-500 hover:text-black transition-all shadow-[0_0_15px_#00f2ff]">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </button>
                    <button onclick="location.reload()" class="p-6 btn-magenta text-white rounded-full">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <button onclick="startCall(null)" class="p-4 rounded-full border-2 border-magenta-500 text-magenta-400 hover:bg-magenta-500 hover:text-black transition-all shadow-[0_0_15px_#ff00ff]">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJsyYpakn99GGYpwjHIHVaMpBEa4SBntI",
            authDomain: "booming-premise-253521.firebaseapp.com",
            projectId: "booming-premise-253521",
            storageBucket: "booming-premise-253521.firebasestorage.app",
            messagingSenderId: "916001736696",
            appId: "1:916001736696:web:5638d8a66f918fa614b80d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let peer;

        window.loginUser = async () => {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) return;

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('call-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = user.toUpperCase();
            document.getElementById('avatar').innerText = user[0].toUpperCase();

            await setDoc(doc(db, "online_users", user), { name: user, room: pass, timestamp: Date.now() });

            peer = new Peer(user);
            peer.on('call', call => {
                if (confirm(`Accept call from ${call.peer}?`)) {
                    navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(stream => {
                        document.getElementById('localVideo').srcObject = stream;
                        call.answer(stream);
                        call.on('stream', rs => document.getElementById('remoteVideo').srcObject = rs);
                    });
                }
            });

            window.addEventListener('beforeunload', () => deleteDoc(doc(db, "online_users", user)));

            const q = query(collection(db, "online_users"), where("room", "==", pass));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('friend-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    if (data.name !== user) {
                        const div = document.createElement('div');
                        div.className = "p-4 glass-container hover:bg-cyan-500/20 transition-all cursor-pointer border-l-4 border-cyan-400 flex justify-between items-center";
                        div.innerHTML = `<span class="font-bold text-cyan-50 uppercase tracking-tighter">${data.name}</span> <span class="status-online"></span>`;
                        div.onclick = () => startCall(data.name);
                        list.appendChild(div);
                    }
                });
            });
        };

        window.startCall = (target) => {
            if(!target) target = prompt("Target Peer ID:");
            if(!target) return;
            navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(stream => {
                document.getElementById('localVideo').srcObject = stream;
                const call = peer.call(target, stream);
                call.on('stream', rs => document.getElementById('remoteVideo').srcObject = rs);
            });
        };
    </script>
</body>
</html>
