<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHTOWN | Final Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@500;700&display=swap');
        body { background: #050112; background-image: radial-gradient(circle at 50% 50%, #1a0b3c 0%, #050112 100%); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .neon-border-cyan { border: 2px solid #00f2ff; box-shadow: 0 0 15px #00f2ff; }
        .neon-border-mag { border: 2px solid #ff00ff; box-shadow: 0 0 15px #ff00ff; }
        .glass { background: rgba(10, 2, 30, 0.85); backdrop-filter: blur(15px); border-radius: 20px; }
        .btn-mag { background: #ff00ff; box-shadow: 0 0 20px #ff00ff; font-family: 'Orbitron'; transition: 0.3s; cursor: pointer; }
        video { border-radius: 15px; background: #000; object-fit: cover; width: 100%; height: 100%; }
        #chat-window { height: 160px; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,0,255,0.2); font-size: 13px; }
        .ctrl-btn { border: 2px solid #00f2ff; padding: 10px 18px; border-radius: 10px; font-weight: bold; font-size: 11px; cursor: pointer; }
        .off { border-color: #ff0000; color: #ff0000; background: rgba(255,0,0,0.1); }
    </style>
</head>
<body class="flex flex-col items-center p-4">

    <div id="auth-screen" class="w-full max-w-md mt-24">
        <div class="glass p-10 text-center neon-border-cyan">
            <h1 class="text-5xl font-black mb-1 italic" style="font-family: 'Orbitron';">
                <span class="text-[#00f2ff]">TECH</span><span class="text-[#ff00ff]">TOWN</span>
            </h1>
            <p class="text-[10px] tracking-[0.5em] text-[#00f2ff] font-bold mb-10 uppercase">Neon Protocol v3.0</p>
            <div class="space-y-6">
                <input type="text" id="username" placeholder="NAME..." class="w-full p-4 rounded-lg bg-black/60 border border-cyan-500/50 outline-none text-cyan-300 font-bold uppercase tracking-widest">
                <input type="password" id="password" placeholder="PIN..." class="w-full p-4 rounded-lg bg-black/60 border border-magenta-500/50 outline-none text-magenta-300 font-bold">
                <button onclick="loginUser()" class="w-full btn-mag p-5 rounded-xl font-black text-xl text-white italic uppercase">Initialize Link</button>
            </div>
        </div>
    </div>

    <div id="call-screen" class="hidden w-full max-w-6xl mt-6">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 glass p-6 flex flex-col neon-border-mag min-h-[550px]">
                <h3 class="text-[#00f2ff] text-sm font-bold uppercase mb-4 tracking-tighter">Active Peers</h3>
                <div id="friend-list" class="space-y-3 mb-6 flex-1 overflow-y-auto pr-2"></div>
                
                <h3 class="text-[#ff00ff] text-xs font-bold uppercase mb-2">Data Feed</h3>
                <div id="chat-window" class="mb-3"></div>
                <div class="flex gap-2">
                    <input type="text" id="msg-input" placeholder="Type..." class="flex-1 bg-black/60 border border-cyan-500/30 rounded p-2 text-xs outline-none">
                    <button onclick="sendMsg()" class="bg-cyan-600 px-3 rounded font-bold text-xs uppercase">Send</button>
                </div>
            </div>

            <div class="lg:col-span-3 flex flex-col gap-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 h-[350px] md:h-[450px]">
                    <div class="relative neon-border-cyan rounded-2xl overflow-hidden"><video id="localVideo" autoplay muted playsinline></video></div>
                    <div class="relative neon-border-mag rounded-2xl overflow-hidden"><video id="remoteVideo" autoplay playsinline></video></div>
                </div>
                <div class="glass p-6 flex justify-center gap-10 self-center px-16 neon-border-cyan">
                    <button id="mic-btn" onclick="toggleMic()" class="ctrl-btn">MIC ON</button>
                    <button onclick="location.reload()" class="bg-red-600 p-4 rounded-full shadow-[0_0_15px_red]"><svg class="w-6 h-6" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                    <button id="cam-btn" onclick="toggleCam()" class="ctrl-btn">CAM ON</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBJsyYpakn99GGYpwjHIHVaMpBEa4SBntI", authDomain: "booming-premise-253521.firebaseapp.com", projectId: "booming-premise-253521", storageBucket: "booming-premise-253521.firebasestorage.app", messagingSenderId: "916001736696", appId: "1:916001736696:web:5638d8a66f918fa614b80d" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let peer, localStream, dataConn;

        window.loginUser = async () => {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            if (!user || !pass) return alert("Missing Identity!");

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('call-screen').classList.remove('hidden');

            localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('localVideo').srcObject = localStream;

            await setDoc(doc(db, "online_users", user), { name: user, room: pass });
            peer = new Peer(user);

            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', rs => document.getElementById('remoteVideo').srcObject = rs);
            });

            peer.on('connection', conn => {
                dataConn = conn;
                conn.on('data', d => appendChat(d, 'peer'));
            });

            onSnapshot(query(collection(db, "online_users"), where("room", "==", pass)), (snap) => {
                const list = document.getElementById('friend-list'); list.innerHTML = "";
                snap.forEach(d => { if (d.data().name !== user) {
                    const div = document.createElement('div');
                    div.className = "p-3 glass border-l-4 border-cyan-400 cursor-pointer hover:bg-cyan-500/10 text-xs font-bold uppercase tracking-tight";
                    div.innerText = d.data().name;
                    div.onclick = () => {
                        peer.call(d.data().name, localStream).on('stream', rs => document.getElementById('remoteVideo').srcObject = rs);
                        dataConn = peer.connect(d.data().name);
                        dataConn.on('data', d => appendChat(d, 'peer'));
                    };
                    list.appendChild(div);
                }});
            });
        };

        window.sendMsg = () => {
            const input = document.getElementById('msg-input');
            if (dataConn && input.value) { dataConn.send(input.value); appendChat(input.value, 'me'); input.value = ""; }
        };

        function appendChat(m, s) {
            const box = document.getElementById('chat-window');
            box.innerHTML += `<div style="color:${s==='me'?'#00f2ff':'#ff00ff'}"><b>${s.toUpperCase()}:</b> ${m}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        window.toggleCam = () => {
            const t = localStream.getVideoTracks()[0]; t.enabled = !t.enabled;
            document.getElementById('cam-btn').innerText = t.enabled ? "CAM ON" : "CAM OFF";
            document.getElementById('cam-btn').classList.toggle('off', !t.enabled);
        };

        window.toggleMic = () => {
            const t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled;
            document.getElementById('mic-btn').innerText = t.enabled ? "MIC ON" : "MIC OFF";
            document.getElementById('mic-btn').classList.toggle('off', !t.enabled);
        };

        window.addEventListener('beforeunload', () => {
            const user = document.getElementById('username').value.trim().toLowerCase();
            if(user) deleteDoc(doc(db, "online_users", user));
        });
    </script>
</body>
</html>
